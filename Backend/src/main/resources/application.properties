spring.application.name=agritrade

server.port=9901

#Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/agritradeDb?useSSL=false&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=kiit@75620
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.devtools.restart.enabled=true

logging.level.root=INFO
logging.level.com.agritrade.agritrade=DEBUG
logging.level.org.springframework.web=INFO

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%logger{36}] - %msg%n

logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.total-size-cap=2GB
logging.logback.rollingpolicy.max-history=365
logging.logback.rollingpolicy.clean-history-on-start=false